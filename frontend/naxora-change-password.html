<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password — NAXORA</title>
  <link rel="stylesheet" href="/naxora-common-auth.css" />
</head>
<body>
  <main class="center-shell">
    <section class="form-card narrow">
      <div class="brand-lockup compact"><span class="brand-mark">N</span><div><strong>NAXORA</strong><small>Secure first login</small></div></div>
      <p class="eyebrow">Password required</p>
      <h1>Create your private password</h1>
      <p class="subtext">Temporary password replace hoga aur purane sessions revoke ho jayenge.</p>
      <form id="changePasswordForm">
        <label>Current / temporary password
          <input id="currentPassword" type="password" autocomplete="current-password" required />
        </label>
        <label>New password
          <input id="newPassword" type="password" autocomplete="new-password" required />
        </label>
        <label>Confirm new password
          <input id="confirmPassword" type="password" autocomplete="new-password" required />
        </label>
        <button id="changeBtn" class="primary full" type="submit">Change Password</button>
      </form>
      <div id="changeMessage" class="message-box" hidden></div>
      <p class="security-note">Minimum 10 characters, at least one letter and one number. Password VANI/chat me mat bhejiye.</p>
    </section>
  </main>
  <script src="/naxora-change-password.js"></script>
</body>
</html>
